# Sync this GitHub repo to a Hugging Face Space.
#
# Setup:
# 1. Create a Space at https://huggingface.co/new-space (Gradio, Blank template)
# 2. Add HF_TOKEN to GitHub Secrets (Settings → Secrets → Actions)
# 3. Set HF_USERNAME and HF_SPACE_NAME below (or as repo variables)
#
name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ vars.HF_USERNAME || github.repository_owner }}
          HF_SPACE_NAME: ${{ vars.HF_SPACE_NAME || 'lifeops' }}
        run: |
          git push --force https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${HF_SPACE_NAME} main
